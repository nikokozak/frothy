name: Release (Manual Bootstrap)

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.release_tag }}

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.release_tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/cli/go.mod
          cache-dependency-path: tools/cli/go.sum
      - name: Verify version
        run: |
          tag_version="${RELEASE_TAG#v}"
          file_version="$(cat VERSION)"
          if [ "$tag_version" != "$file_version" ]; then
            echo "ERROR: tag $RELEASE_TAG does not match VERSION ($file_version)"
            exit 1
          fi
          make version-check
      - run: make sdk-payload
      - name: Build CLI tarballs
        run: |
          mkdir -p dist
          cd tools/cli
          for pair in darwin/arm64 darwin/amd64 linux/amd64; do
            os="${pair%/*}"
            arch="${pair#*/}"
            stage="$(mktemp -d)"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -o "$stage/frothy" .
            "$GITHUB_WORKSPACE/tools/package-release.sh" "$stage/frothy" "${RELEASE_TAG#v}" "$os" "$arch" "$GITHUB_WORKSPACE/dist"
            rm -rf "$stage"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: cli-artifacts
          path: dist/*.tar.gz

  validate-workshop-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.release_tag }}
      - name: Verify workshop docs and export surface
        run: |
          sh tools/frothy/export_workshop_repo.sh check
          sh tools/frothy/proof_workshop_ops_docs.sh

  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.release_tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/vscode/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/cli/go.mod
          cache-dependency-path: tools/cli/go.sum
      - name: Test VS Code extension
        run: make test-vscode
      - name: Package VS Code extension
        working-directory: tools/vscode
        run: |
          extension_version="$(node -p "require('./package.json').version")"
          mkdir -p "$GITHUB_WORKSPACE/dist"
          npx vsce package --no-yarn --out "$GITHUB_WORKSPACE/dist/frothy-vscode-v${extension_version}.vsix"
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-artifacts
          path: dist/*.vsix

  release:
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - build-vscode
      - validate-workshop-surface
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.release_tag }}
      - uses: actions/download-artifact@v4
        with:
          name: cli-artifacts
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: vscode-artifacts
          path: dist
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > "frothy-${RELEASE_TAG}-checksums.txt"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*.tar.gz
            dist/*.vsix
            dist/*-checksums.txt
          prerelease: ${{ startsWith(inputs.release_tag, 'v0.') }}
          generate_release_notes: true
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${RELEASE_TAG#v}"
          darwin_arm64_sha="$(sha256sum "dist/frothy-${RELEASE_TAG}-darwin-arm64.tar.gz" | cut -d' ' -f1)"
          darwin_amd64_sha="$(sha256sum "dist/frothy-${RELEASE_TAG}-darwin-amd64.tar.gz" | cut -d' ' -f1)"
          linux_amd64_sha="$(sha256sum "dist/frothy-${RELEASE_TAG}-linux-amd64.tar.gz" | cut -d' ' -f1)"

          ./tools/update-homebrew-tap.sh "$version" "$darwin_arm64_sha" "$darwin_amd64_sha" "$linux_amd64_sha"
